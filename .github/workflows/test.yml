name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d app_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: src/backend/requirements.txt

      - name: Install dependencies
        working-directory: src/backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff mypy

      - name: Ruff
        working-directory: src/backend
        run: ruff check app/ tests/

      - name: Mypy
        working-directory: src/backend
        run: mypy app/ --ignore-missing-imports

      - name: Pytest
        working-directory: src/backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/app_test
          REDIS_URL: redis://localhost:6379/0
          LLM_PROVIDER: anthropic
          ANTHROPIC_API_KEY: test-key-not-real
          OPENAI_API_KEY: test-key-not-real
        run: pytest tests/ -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Lint
        working-directory: src/frontend
        run: npm run lint

      - name: Typecheck
        working-directory: src/frontend
        run: npm run typecheck

      - name: Unit tests
        working-directory: src/frontend
        run: npm test -- --run
